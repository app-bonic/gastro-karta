<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>Gastro Tražilica — karta recenzija</title>
<link rel="icon" href="pin-logo.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* uvijek isti (svijetli) izgled, i kad je mobitel u dark modu — bez auto-invertiranja */
  :root { color-scheme: only light; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; }
  #app { display: flex; height: 100%; }

  #sidebar {
    width: 340px; min-width: 340px; height: 100%; overflow-y: auto;
    background: #1a1a2e; color: #eee; display: flex; flex-direction: column;
  }
  #sidebar header { padding: 14px 16px 10px; background: #16162a; position: sticky; top: 0; z-index: 5; }
  .logo-badge {
    display: block; background: #fff; border-radius: 10px; padding: 8px 14px;
    text-align: center; line-height: 0;
  }
  .logo-badge img { max-width: 100%; height: 44px; object-fit: contain; }
  #sidebar .sub { font-size: 12px; color: #999; margin-top: 4px; }
  #searchWrap { position: relative; margin-top: 10px; }
  #search {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #333; background: #22223a; color: #eee; font-size: 14px; outline: none;
  }
  #search:focus { border-color: #e94560; }
  #listToggle { display: none; }

  #footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; background: #16162a; border-top: 1px solid #24243c;
  }
  #footer img { height: 26px; background: #fff; border-radius: 6px; padding: 3px 8px; display: block; }
  #footer .socials { display: flex; gap: 16px; align-items: center; }
  #footer .socials svg { width: 22px; height: 22px; opacity: .8; display: block; }
  #footer .socials a:hover svg { opacity: 1; }

  /* splash: logo lijepo doleti u sredinu pri pokretanju */
  #splash {
    position: fixed; inset: 0; z-index: 5000; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .5s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash img {
    width: min(70%, 300px); background: #fff; border-radius: 16px; padding: 18px 26px;
    animation: splashIn .7s ease both;
  }
  @keyframes splashIn {
    from { opacity: 0; transform: scale(.72) translateY(14px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  #countries { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .chip {
    font-size: 11.5px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
    background: #22223a; border: 1px solid #333; color: #ccc; user-select: none;
  }
  .chip:hover { border-color: #e94560; }
  .chip.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: 600; }
  #list { flex: 1; }
  .item {
    display: flex; gap: 10px; padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid #24243c; align-items: center;
  }
  .item:hover, .item.active { background: #2a2a4a; }
  .item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; background: #333; }
  .item .t { font-size: 14px; font-weight: 600; line-height: 1.25; }
  .item .m { font-size: 11px; color: #e9a545; margin-top: 2px; }
  .item .d { font-size: 11.5px; color: #9a9ab5; margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  #map { flex: 1; height: 100%; }

  .locate-btn {
    display: block; background: #fff; color: #333 !important; font-size: 13px;
    font-weight: 600; padding: 6px 10px; border-radius: 4px; text-decoration: none;
    box-shadow: 0 1px 5px rgba(0,0,0,.4); white-space: nowrap; cursor: pointer;
  }
  .locate-btn:hover { background: #f4f4f4; }
  .full-btn { font-size: 20px; padding: 3px 12px; line-height: 1.4; }

  /* veci X za zatvaranje popupa */
  .leaflet-container a.leaflet-popup-close-button {
    font-size: 26px; width: 34px; height: 34px; top: 2px; right: 2px;
  }

  .gt-pin { filter: drop-shadow(0 2px 4px rgba(0,0,0,.45)); }
  .gt-pin .bubble {
    width: 34px; height: 34px; background: #fff; border: 3px solid #e94560;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .gt-pin .bubble img { width: 24px; height: 24px; object-fit: contain; }
  .gt-pin .tail {
    width: 0; height: 0; margin: -2px auto 0;
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-top: 10px solid #e94560;
  }

  .popup-card { width: 240px; }
  .popup-card img.hero { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; }
  .popup-card h3 { font-size: 15px; margin: 6px 0 4px; }
  .popup-card .rating { font-size: 12.5px; font-weight: 600; margin-bottom: 3px; }
  .popup-card .addr { font-size: 11.5px; color: #666; margin-bottom: 5px; }
  .popup-card p { font-size: 12px; color: #444; margin-bottom: 8px; }
  .popup-card .btns { display: flex; gap: 6px; }
  .popup-card .btns a {
    flex: 1; text-align: center; font-size: 12.5px; color: #fff;
    padding: 6px 4px; border-radius: 6px; text-decoration: none; font-weight: 600;
  }
  .popup-card .btn-rec { background: #e94560; }
  .popup-card .btn-nav { background: #1a73e8; }


  @media (max-width: 700px) {
    #app { flex-direction: column; height: 100dvh; }

    /* gore: chipovi zemalja + trazilica, ispod karta */
    #sidebar { width: 100%; min-width: 0; order: 1; flex: none; height: auto; overflow: visible; }
    #map { order: 2; height: auto; flex: 1; }

    #sidebar header { position: static; padding: 8px 10px; }
    .logo-badge { display: none; }
    #sidebar .sub { display: none; }

    /* chipovi u TRI reda, horizontalno skrolabilni */
    #countries {
      display: grid; grid-auto-flow: column; grid-template-rows: repeat(3, auto);
      justify-content: start; gap: 5px;
      overflow-x: auto; margin-top: 0; padding-bottom: 3px;
    }
    #countries .chip { font-size: 11.5px; padding: 5px 11px; width: max-content; }

    /* trazilica sira/veca, logo u pozadini, strelica za popis desno */
    #searchWrap { margin-top: 8px; }
    #search {
      padding: 11px 40px 11px 14px; font-size: 15px;
      background-color: #fff; color: #111; font-weight: 600;
      background-image: linear-gradient(rgba(255,255,255,.85), rgba(255,255,255,.85)), url('logo.png');
      background-repeat: no-repeat; background-position: center;
      background-size: cover, auto 28px;
      border: 1px solid #ccc;
    }
    #search::placeholder { color: #555; }
    #listToggle {
      display: block; position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      border: none; background: transparent; font-size: 21px; color: #333;
      padding: 4px 10px; cursor: pointer; line-height: 1;
    }

    /* popis: na pocetku skriven; klik u trazilicu ga otvori preko cijelog ekrana */
    #list { display: none; }
    #app.searching #sidebar { height: auto; flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #app.searching #list { display: block; flex: 1; overflow-y: auto; min-height: 0; }
    #app.searching #map { display: none; }

    /* fullscreen mod karte: sakrij sve osim karte */
    #app.mapfull #sidebar, #app.mapfull #footer { display: none; }

    /* footer na dnu ekrana — mrvicu veci */
    #footer { order: 3; flex: none; padding: 13px 16px; }
    #footer img { height: 32px; }
    #footer .socials { gap: 20px; }
    #footer .socials svg { width: 27px; height: 27px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <header>
      <a class="logo-badge" href="https://gastrotrazilica.com/" target="_blank" title="gastrotrazilica.com">
        <img src="logo.png" alt="Gastro Tražilica">
      </a>
      <div class="sub" id="counter">Učitavam…</div>
      <div id="countries"></div>
      <div id="searchWrap">
        <input id="search" type="text" placeholder="Traži restoran…">
        <button id="listToggle" title="Otvori/zatvori popis">▾</button>
      </div>
    </header>
    <div id="list"></div>
    <div id="footer">
      <a href="https://gastrotrazilica.com/" target="_blank"><img src="logo.png" alt="Gastro Tražilica"></a>
      <div class="socials">
        <a href="https://www.youtube.com/@gastrotrazilica" target="_blank" title="YouTube"><svg viewBox="0 0 24 24"><path fill="#fff" d="M23.5 6.2s-.2-1.6-.9-2.3c-.9-.9-1.9-.9-2.4-1C16.9 2.5 12 2.5 12 2.5s-4.9 0-8.2.4c-.5.1-1.5.1-2.4 1-.7.7-.9 2.3-.9 2.3S0 8.1 0 10v1.9c0 1.9.2 3.8.2 3.8s.2 1.6.9 2.3c.9.9 2 .9 2.5 1 1.8.2 7.6.4 8.4.4 0 0 4.9 0 8.2-.4.5-.1 1.5-.1 2.4-1 .7-.7.9-2.3.9-2.3s.2-1.9.2-3.8V10c0-1.9-.2-3.8-.2-3.8zM9.5 14.6V7.9l6.5 3.4-6.5 3.3z"/></svg></a>
        <a href="https://www.facebook.com/gastrotrazilica/" target="_blank" title="Facebook"><svg viewBox="0 0 24 24"><path fill="#fff" d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg></a>
        <a href="https://www.instagram.com/gastrotrazilica/" target="_blank" title="Instagram"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12 2.2c3.2 0 3.6 0 4.8.1 1.2.1 1.9.2 2.3.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.2.4.4 1.1.4 2.3.1 1.2.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.2-.2 1.9-.4 2.3-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.2-1.1.4-2.3.4-1.2.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.2-.1-1.9-.2-2.3-.4-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.2-.4-.4-1.1-.4-2.3-.1-1.2-.1-1.6-.1-4.8s0-3.6.1-4.8c.1-1.2.2-1.9.4-2.3.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.2 1.1-.4 2.3-.4 1.2-.1 1.6-.1 4.8-.1zm0 4.9a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 8.2a3.2 3.2 0 1 1 0-6.4 3.2 3.2 0 0 1 0 6.4zm6.4-8.4a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z"/></svg></a>
        <a href="https://www.tiktok.com/@gastrotrazilica" target="_blank" title="TikTok"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></a>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>
<div id="splash"><img src="logo.png" alt="Gastro Tražilica"></div>

<script src="data.js"></script>
<script>
  const map = L.map('map', { zoomControl: false }).setView([45.1, 16.4], 7);
  L.control.zoom({ position: 'topleft' }).addTo(map);

  // Dvije podloge: svijetla moderna (odzumirano) i detaljna OSM (zumirano)
  const DETAIL_ZOOM = 12;
  const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
    attribution: '&copy; OpenStreetMap &copy; CARTO | podaci: gastrotrazilica.com'
  });
  const detailTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap | podaci: gastrotrazilica.com'
  });
  lightTiles.addTo(map);
  map.on('zoomend', () => {
    const z = map.getZoom();
    if (z >= DETAIL_ZOOM && !map.hasLayer(detailTiles)) {
      map.addLayer(detailTiles); map.removeLayer(lightTiles);
    } else if (z < DETAIL_ZOOM && !map.hasLayer(lightTiles)) {
      map.addLayer(lightTiles); map.removeLayer(detailTiles);
    }
  });

  // Gumb "Di sam ja?" — geolokacija (radi na localhostu i HTTPS-u)
  let myMarker = null, myCircle = null;
  const LocateControl = L.Control.extend({
    options: { position: 'topleft' },
    onAdd() {
      const btn = L.DomUtil.create('a', 'locate-btn');
      btn.href = '#';
      btn.innerHTML = '📍 Di sam ja?';
      btn.title = 'Pokaži moju lokaciju';
      L.DomEvent.on(btn, 'click', e => {
        L.DomEvent.stop(e);
        if (!navigator.geolocation) { alert('Preglednik ne podržava geolokaciju.'); return; }
        btn.innerHTML = '⏳ Tražim…';
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude: lat, longitude: lng, accuracy } = pos.coords;
          if (myMarker) { map.removeLayer(myMarker); map.removeLayer(myCircle); }
          myMarker = L.circleMarker([lat, lng], {
            radius: 8, color: '#fff', weight: 3, fillColor: '#1a73e8', fillOpacity: 1
          }).addTo(map).bindPopup('Tu si ti 👋');
          myCircle = L.circle([lat, lng], { radius: accuracy, color: '#1a73e8', weight: 1, fillOpacity: 0.12 }).addTo(map);
          map.flyTo([lat, lng], 13, { duration: 1 });
          btn.innerHTML = '📍 Di sam ja?';
        }, err => {
          btn.innerHTML = '📍 Di sam ja?';
          const poruke = { 1: 'Odbio si pristup lokaciji — dozvoli je u pregledniku.', 2: 'Lokacija nije dostupna.', 3: 'Isteklo vrijeme za dohvat lokacije.' };
          alert(poruke[err.code] || 'Ne mogu dohvatiti lokaciju.');
        }, { enableHighAccuracy: true, timeout: 10000 });
      });
      return btn;
    }
  });
  const locateCtl = new LocateControl();
  map.addControl(locateCtl);

  // Gumb za rastezanje karte preko cijelog ekrana (mobitel, dolje lijevo) — isti gumb vraca na zadano
  const FullControl = L.Control.extend({
    options: { position: 'bottomleft' },
    onAdd() {
      const btn = L.DomUtil.create('a', 'locate-btn full-btn');
      btn.href = '#';
      btn.innerHTML = '⛶';
      btn.title = 'Karta preko cijelog ekrana';
      L.DomEvent.on(btn, 'click', e => {
        L.DomEvent.stop(e);
        const full = document.getElementById('app').classList.toggle('mapfull');
        btn.innerHTML = full ? '⤡' : '⛶';
        setTimeout(() => map.invalidateSize(), 60);
      });
      return btn;
    }
  });
  const fullCtl = new FullControl();

  const icon = L.divIcon({
    className: 'gt-pin',
    html: '<div class="bubble"><img src="pin-logo.png" alt=""></div><div class="tail"></div>',
    iconSize: [34, 44], iconAnchor: [17, 44], popupAnchor: [0, -44]
  });

  function popupHtml(r) {
    const nav = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}&travelmode=driving`;
    return `<div class="popup-card">
      ${r.img ? `<img class="hero" src="${r.img}" alt="">` : ''}
      <h3>${r.title}</h3>
      ${r.rating ? `<div class="rating">⭐ ${(+r.rating).toFixed(1)}${r.reviews ? ` · ${r.reviews} recenzija na Googleu` : ''}</div>` : ''}
      ${r.addr ? `<div class="addr">📍 ${r.addr}</div>` : ''}
      <p>${(r.desc || '').slice(0, 150)}…</p>
      <div class="btns">
        <a class="btn-rec" href="${r.url}" target="_blank">Otvori recenziju</a>
        <a class="btn-nav" href="${nav}" target="_blank">🧭 Uputi me</a>
      </div>
    </div>`;
  }

  const markers = {};
  let markerLayer = L.layerGroup().addTo(map);
  let activeCountry = 'Sve';

  function visible() {
    return RESTORANI.filter(r => activeCountry === 'Sve' || r.drzava === activeCountry);
  }

  function renderMarkers() {
    markerLayer.clearLayers();
    const vis = visible().filter(r => r.lat && r.lng);
    vis.forEach(r => {
      markers[r.url] = L.marker([r.lat, r.lng], { icon }).addTo(markerLayer)
        .bindPopup(popupHtml(r), { maxWidth: 260, autoPan: true, autoPanPadding: [14, 16], keepInView: true });
    });
    if (!vis.length) return;
    // "Sve" na mobitelu: fiksni pogled na regiju s pinovima (ne fitBounds do Svicarske);
    // pojedinacna zemlja: zumiraj na nju kao i prije
    if (activeCountry === 'Sve' && window.matchMedia('(max-width: 700px)').matches) {
      map.setView([44.4, 17.6], 6);
    } else {
      map.fitBounds(vis.map(r => [r.lat, r.lng]), { padding: [40, 40] });
    }
  }

  const list = document.getElementById('list');
  function renderList(filter) {
    list.innerHTML = '';
    const f = (filter || '').toLowerCase();
    const sorted = [...visible()].sort((a, b) => a.title.localeCompare(b.title, 'hr'));
    sorted.forEach(r => {
      if (f && !r.title.toLowerCase().includes(f) && !(r.desc || '').toLowerCase().includes(f)) return;
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `
        ${r.img ? `<img src="${r.img}" loading="lazy" alt="">` : '<img alt="">'}
        <div>
          <div class="t">${r.title}</div>
          <div class="m">${r.rating ? `⭐ ${(+r.rating).toFixed(1)} · ` : ''}${r.drzava}</div>
          <div class="d">${r.desc || ''}</div>
        </div>`;
      el.onclick = () => {
        if (r.lat && markers[r.url]) {
          hideSearchList();
          // pricekaj da se karta opet prikaze pa doleti; popup tek na kraju da autopan tocno stane u ekran
          setTimeout(() => {
            map.flyTo([r.lat, r.lng], 14, { duration: 0.8 });
            map.once('moveend', () => markers[r.url].openPopup());
          }, 80);
          document.querySelectorAll('.item.active').forEach(x => x.classList.remove('active'));
          el.classList.add('active');
        } else {
          window.open(r.url, '_blank');
        }
      };
      list.appendChild(el);
    });
  }

  function updateCounter() {
    const vis = visible();
    const geo = vis.filter(r => r.lat).length;
    document.getElementById('counter').textContent =
      `${vis.length} recenzija · ${geo} na karti` + (vis.length - geo ? ` · ${vis.length - geo} bez lokacije` : '');
  }

  const countryBox = document.getElementById('countries');
  const countries = ['Sve', ...[...new Set(RESTORANI.map(r => r.drzava))]];
  countries.forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (c === 'Sve' ? ' active' : '');
    const n = c === 'Sve' ? RESTORANI.length : RESTORANI.filter(r => r.drzava === c).length;
    chip.textContent = `${c} (${n})`;
    chip.onclick = () => {
      activeCountry = c;
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      chip.classList.add('active');
      renderMarkers();
      renderList(document.getElementById('search').value);
      updateCounter();
    };
    countryBox.appendChild(chip);
  });

  // Mobitel: popis je skriven; klik u trazilicu ga odmah otvori preko cijelog ekrana,
  // izbor restorana ili strelica ▾/▴ ga zatvori
  const mq = window.matchMedia('(max-width: 700px)');
  const searchEl = document.getElementById('search');
  const appEl = document.getElementById('app');
  const toggleEl = document.getElementById('listToggle');
  function openSearchList() {
    if (!mq.matches) return;
    appEl.classList.add('searching');
    toggleEl.textContent = '▴';
  }
  function hideSearchList() {
    if (!mq.matches) return;
    appEl.classList.remove('searching');
    toggleEl.textContent = '▾';
    searchEl.blur();
    setTimeout(() => map.invalidateSize(), 50);
  }
  searchEl.addEventListener('focus', openSearchList);
  searchEl.addEventListener('click', openSearchList);
  toggleEl.addEventListener('click', () => {
    if (appEl.classList.contains('searching')) hideSearchList();
    else { openSearchList(); searchEl.focus(); }
  });

  // Footer: na desktopu dno sidebara, na mobitelu dno ekrana
  const footerEl = document.getElementById('footer');
  function placeFooter() {
    if (mq.matches) appEl.appendChild(footerEl);
    else document.getElementById('sidebar').appendChild(footerEl);
  }
  // "Di sam ja?": na mobitelu dolje desno, na desktopu gore lijevo
  function placeLocate() { locateCtl.setPosition(mq.matches ? 'bottomright' : 'topleft'); }
  // Fullscreen gumb postoji samo na mobitelu
  function placeFull() {
    if (mq.matches) map.addControl(fullCtl);
    else { try { map.removeControl(fullCtl); } catch (e) {} appEl.classList.remove('mapfull'); }
  }
  mq.addEventListener('change', () => { placeFooter(); placeLocate(); placeFull(); });
  placeFooter();
  placeLocate();
  placeFull();

  renderMarkers();
  renderList('');
  updateCounter();
  document.getElementById('search').addEventListener('input', e => renderList(e.target.value));

  // Splash nestaje nakon sto se logo "dovede" u sredinu
  const splashEl = document.getElementById('splash');
  setTimeout(() => {
    splashEl.classList.add('hide');
    setTimeout(() => splashEl.remove(), 600);
  }, 1100);
</script>
</body>
